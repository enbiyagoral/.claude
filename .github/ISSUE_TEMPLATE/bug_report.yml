name: Bug report
description: Report something that is not working as expected
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please search existing issues before submitting.
        If this is a security issue, do not open a public issue. Follow SECURITY.md.

  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What is broken?
      placeholder: A clear and short description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run ...
        2. Open ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share relevant environment details
      placeholder: |
        - OS:
        - Shell:
        - Claude Code context:
        - Repo commit/branch:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs, stack traces, or screenshots if available
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: I confirm this is not a security vulnerability report
          required: true
