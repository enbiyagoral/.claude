name: Feature request
description: Suggest an improvement or new capability
title: "[enhancement]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Please describe the problem first, then the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: What is difficult or missing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
      placeholder: Describe the expected behavior or UX
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives have you considered?

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Who benefits and what parts of the template would change?
      placeholder: README, skills, hooks, rules, docs, etc.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: This request stays generic (not tied to one app stack)
          required: true
